<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding-top: 0;">
    <div class="container" style="max-width: 420px;">
        <div class="text-center mb-4">
            <h1 class="fw-bold" style="font-family: 'Outfit', sans-serif; color: var(--primary); font-size: 2.5rem;">IMS</h1>
            <p class="text-muted">Inventory Management System</p>
        </div>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ success }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-4" style="font-family: 'Outfit', sans-serif;">Log In</h4>

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Log In</button>
                </form>
            </div>
        </div>

        <p class="text-center text-muted mt-4 small">
            Don't have an account? <a href="/register" class="text-decoration-none fw-bold" style="color: var(--primary);">Register here</a>
        </p>

        <div class="text-center mt-3">
            <p class="text-muted small mb-1">Demo accounts:</p>
            <p class="text-muted small mb-0">Admin: ahnaf@example.com / admin123</p>
            <p class="text-muted small">User: jane@retail.com / user123</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
